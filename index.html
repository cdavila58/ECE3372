<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Convolution Demo (JS)</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    /* Center the demo horizontally */
    #wrap {
      width: fit-content;
      margin: 8px auto;
    }

    /* Do NOT fix width/height here.
       JS fitCanvas() will set size dynamically. */
    canvas {
      display: block;
      border: 0;
    }

    .btnrow {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      width: 70px;
      height: 28px;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <canvas id="cv"></canvas>

    <div class="btnrow">
      <button id="startBtn">Start</button>
      <button id="nextBtn">Next t</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
